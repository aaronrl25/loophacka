<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-1: #0a0a12;
      --bg-2: #12121f;
      --accent-1: #7c3aed;
      --accent-2: #06b6d4;
      --accent-3: #f472b6;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    html, body {
      min-height: 100%;
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg-1);
      color: var(--text);
      overflow-x: hidden;
    }

    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora span {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .aurora span:nth-child(1) {
      width: 55vw;
      height: 55vw;
      top: -20%;
      left: -10%;
      background: radial-gradient(circle, var(--accent-1), transparent 70%);
    }

    .aurora span:nth-child(2) {
      width: 45vw;
      height: 45vw;
      bottom: -15%;
      right: -5%;
      background: radial-gradient(circle, var(--accent-2), transparent 70%);
      animation-delay: -6s;
    }

    .aurora span:nth-child(3) {
      width: 35vw;
      height: 35vw;
      top: 35%;
      left: 40%;
      background: radial-gradient(circle, var(--accent-3), transparent 70%);
      animation-delay: -12s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(4%, -3%) scale(1.08); }
    }

    .grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 20%, transparent 100%);
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      margin-bottom: 2rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      animation: fadeUp 0.9s ease both;
    }

    .badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
      box-shadow: 0 0 12px var(--accent-2);
    }

    h1 {
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.9s ease 0.1s both;
    }

    h1 .gradient {
      background: linear-gradient(120deg, #fff 0%, #c4b5fd 35%, #67e8f9 70%, #f9a8d4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 32rem;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      line-height: 1.7;
      color: var(--muted);
      animation: fadeUp 0.9s ease 0.2s both;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-top: 2.5rem;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    .cta {
      padding: 0.85rem 1.6rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-primary {
      color: #0a0a12;
      background: linear-gradient(135deg, #e9d5ff, #67e8f9);
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.35);
    }

    .cta-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(6, 182, 212, 0.45);
    }

    .cta-ghost {
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
    }

    .cta-ghost:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.3);
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      z-index: 1;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(148, 163, 184, 0.6);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fadeUp 1s ease 0.5s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span></span>
    <span></span>
    <span></span>
  </div>
  <div class="grid" aria-hidden="true"></div>

  <main>
    <div class="badge">Live on Zero</div>
    <h1><span class="gradient">Hello, World</span></h1>
    <p>
      A tiny page with a big glow — deployed in seconds through Zero's free web hosting.
      Welcome to the open web.
    </p>
    <div class="cta-row">
      <a class="cta cta-primary" href="https://www.zero.xyz" target="_blank" rel="noopener">Explore Zero</a>
      <a class="cta cta-ghost" href="#top">Say hi</a>
    </div>
  </main>

  <footer>Made with curiosity</footer>
</body>
</html>
